<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JOVI – Caso 1</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /*
      Lousa (528x328) → cover 375x597
      scale=1.82, crop_x=293px
      A lousa ocupa a faixa superior da imagem (y=0 a ~55%).
      Quadrado cobre toda a área da lousa.
    */
    #det-doc {
      left: 4px;
      top: 6%;
      width: 367px;
      height: 52%;
    }
  </style>
</head>
<body data-page="1">
<div class="phone">

  <div class="top-bar">
    <button class="icon-btn" id="btn-hd">HD</button>
    <button class="icon-btn" id="btn-mute"><svg viewBox="0 0 24 24"><line x1="2" y1="2" x2="22" y2="22"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"/><path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2c0 .35-.03.7-.08 1"/><line x1="12" y1="19" x2="12" y2="22"/></svg></button>
    <button class="icon-btn" id="btn-modes"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg></button>
    <button class="icon-btn" id="btn-gear"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
  </div>

  <div class="viewfinder">
    <div class="vf-inner" id="vf-inner">
      <img class="bg-img" id="bg-img-main" src="img/lousa.png" alt="Lousa">
      <div class="detect-box" id="det-doc"></div>
      <div class="mode-badge" id="mode-badge">Modo Documento</div>
      <div class="subject-popup" id="subject-popup">
        <div class="subject-icon">📐</div>
        <div class="subject-info">
          <span class="subject-name">Matemática</span>
          <span class="subject-detail">Documento detectado · Lousa</span>
        </div>
      </div>
    </div>

    <div class="float-settings" id="float-settings">
      <button class="f-btn" id="fb-timer"><span class="fi">⏱</span> Timer <span class="fv" id="fv-timer">Off</span></button>
      <button class="f-btn" id="fb-filtro"><span class="fi">🎨</span> Filtro <span class="fv" id="fv-filtro">Nenhum</span></button>
      <button class="f-btn" id="fb-ratio"><span class="fi">⬜</span> Zoom <span class="fv" id="fv-ratio">1×</span></button>
    </div>
    <div class="timer-ov" id="timer-ov"></div>
    <div class="flash" id="flash"></div>

    <div class="gallery-overlay" id="gallery-overlay">
      <div class="gallery-header">
        <span class="gallery-title">Galeria · Casos</span>
        <button class="gallery-close" id="gallery-close">✕</button>
      </div>
      <div class="gallery-grid">
        <div class="gallery-thumb selected" data-page="caso1.html" data-src="img/lousa.png" data-label="Modo Documento">
          <img src="img/lousa.png" alt="Caso 1">
          <div class="thumb-label">Caso 1</div>
        </div>
        <div class="gallery-thumb" data-page="caso2.html" data-src="img/grupo.png" data-label="Modo Retrato">
          <img src="img/grupo.png" alt="Caso 2">
          <div class="thumb-label">Caso 2</div>
        </div>
        <div class="gallery-thumb" data-page="caso3.html" data-src="img/floresta.png" data-label="Modo Escuro">
          <img src="img/floresta.png" alt="Caso 3">
          <div class="thumb-label">Caso 3</div>
        </div>
      </div>
      <div class="gallery-expanded" id="gallery-expanded">
        <img id="exp-img" src="" alt="">
        <div class="exp-label" id="exp-label"></div>
      </div>
      <p class="gallery-hint">Toque na prévia para abrir o caso</p>
    </div>
  </div>

  <div class="ratio-toast" id="ratio-toast"></div>

  <div class="mode-bar">
    <a class="mode-tab" href="caso1.html">Vídeo</a>
    <a class="mode-tab active">Foto</a>
    <a class="mode-tab" href="caso2.html">Retrato</a>
  </div>

  <div class="bottom-bar">
    <button class="side-btn" id="gallery-btn">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
    </button>
    <button class="shutter" id="shutter"><div class="shutter-dot"></div></button>
    <button class="side-btn"><svg viewBox="0 0 24 24"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/></svg></button>
  </div>

</div>
<script src="shared.js"></script>
</body>
</html>
