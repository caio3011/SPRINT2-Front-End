<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JOVI – Caso 2</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /*
      Unsplash photo-1529156069898: grupo de jovens ABRAÇADOS de frente,
      sorridentes, ao ar livre. 4 rostos visíveis na faixa superior.
      object-position top para manter os rostos no frame.

      Mapeamento dos rostos (viewfinder 375 × ~600px):
        fb1 → esq extrema  : left 4%,  top 14%, 60×70px
        fb2 → centro-esq   : left 26%, top 10%, 66×76px
        fb3 → centro-dir   : left 50%, top  8%, 70×82px
        fb4 → dir extrema  : left 72%, top 12%, 62×72px
    */
    .bg-img { object-position: top center; }

    #fb1 { width:60px; height:70px; top:14%; left: 4%; }
    #fb2 { width:66px; height:76px; top:10%; left:26%; }
    #fb3 { width:70px; height:82px; top: 8%; left:50%; }
    #fb4 { width:62px; height:72px; top:12%; left:72%; }
  </style>
</head>
<body data-page="2">
<div class="phone">

  <div class="top-bar">
    <button class="icon-btn" id="btn-hd">HD</button>
    <button class="icon-btn" id="btn-mute">
      <svg viewBox="0 0 24 24"><line x1="2" y1="2" x2="22" y2="22"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"/><path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2c0 .35-.03.7-.08 1"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
    </button>
    <button class="icon-btn" id="btn-modes">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
    </button>
    <button class="icon-btn" id="btn-gear">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>

  <div class="viewfinder">
    <div class="vf-inner" id="vf-inner">
      <!--
        Troca para uma foto onde o grupo está DEFINITIVAMENTE de frente:
        photo-1607748862156 — 4 amigos sorrindo de frente para a câmera
      -->
      <img class="bg-img" id="main-img"
        src="https://images.unsplash.com/photo-1607748862156-7c548e7e98f4?w=800&q=85"
        alt="Grupo de frente">

      <div class="fb" id="fb1"></div>
      <div class="fb" id="fb2"></div>
      <div class="fb" id="fb3"></div>
      <div class="fb" id="fb4"></div>

      <div class="mode-badge" id="mode-badge">Modo Retrato</div>
    </div>

    <div class="float-settings" id="float-settings">
      <button class="f-btn" id="fb-timer"><span class="fi">⏱</span> Timer <span class="fv" id="fv-timer">Off</span></button>
      <button class="f-btn" id="fb-filtro"><span class="fi">🎨</span> Filtro <span class="fv" id="fv-filtro">Nenhum</span></button>
      <button class="f-btn" id="fb-ratio"><span class="fi">⬜</span> Zoom <span class="fv" id="fv-ratio">1×</span></button>
    </div>
    <div class="timer-ov" id="timer-ov"></div>
    <div class="flash" id="flash"></div>

    <!-- GALLERY -->
    <div class="gallery-overlay" id="gallery-overlay">
      <div class="gallery-header">
        <span class="gallery-title">Galeria · Casos</span>
        <button class="gallery-close" id="gallery-close">✕</button>
      </div>
      <div class="gallery-grid">
        <div class="gallery-thumb" data-page="caso1.html"
          data-src="https://images.unsplash.com/photo-1635070041078-e363dbe005cb?w=500&q=80"
          data-label="Modo Documento">
          <img src="https://images.unsplash.com/photo-1635070041078-e363dbe005cb?w=200&q=70" alt="">
          <div class="thumb-label">Caso 1</div>
        </div>
        <div class="gallery-thumb" data-page="caso2.html"
          data-src="https://images.unsplash.com/photo-1607748862156-7c548e7e98f4?w=500&q=80"
          data-label="Modo Retrato">
          <img src="https://images.unsplash.com/photo-1607748862156-7c548e7e98f4?w=200&q=70" alt="">
          <div class="thumb-label">Caso 2</div>
        </div>
        <div class="gallery-thumb" data-page="caso3.html"
          data-src="https://images.unsplash.com/photo-1448375240586-882707db888b?w=500&q=80"
          data-label="Modo Escuro">
          <img src="https://images.unsplash.com/photo-1448375240586-882707db888b?w=200&q=70" alt="">
          <div class="thumb-label">Caso 3</div>
        </div>
      </div>
      <div class="gallery-expanded" id="gallery-expanded">
        <img id="exp-img" src="" alt="">
        <div class="exp-label" id="exp-label"></div>
      </div>
      <p class="gallery-hint">Toque na prévia para abrir o caso</p>
    </div>
  </div>

  <div class="ratio-toast" id="ratio-toast"></div>

  <div class="mode-bar">
    <a class="mode-tab" href="caso1.html">Vídeo</a>
    <a class="mode-tab" href="caso1.html">Foto</a>
    <a class="mode-tab active">Retrato</a>
  </div>

  <div class="bottom-bar">
    <button class="side-btn" id="gallery-btn">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
    </button>
    <button class="shutter" id="shutter"><div class="shutter-dot"></div></button>
    <button class="side-btn">
      <svg viewBox="0 0 24 24"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
    </button>
  </div>

</div>
<script src="shared.js"></script>
<script>
  window.addEventListener('DOMContentLoaded', () => {
    const ids    = ['fb1','fb2','fb3','fb4'];
    const delays = [700, 950, 600, 1150];
    const badge  = document.getElementById('mode-badge');
    const img    = document.getElementById('main-img');

    const run = () => {
      ids.forEach((id, i) =>
        setTimeout(() => document.getElementById(id).classList.add('show'), delays[i])
      );
      setTimeout(() => {
        badge.classList.add('show');
        setTimeout(() => badge.classList.remove('show'), 2800);
      }, 1400);
    };

    if (img.complete) run(); else img.addEventListener('load', run);
  });
</script>
</body>
</html>
